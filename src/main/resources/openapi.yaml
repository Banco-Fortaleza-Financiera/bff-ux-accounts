openapi: 3.0.3
info:
  title: BFF OpenAPI channel Account
  version: 1.0.0
  description: API for account management.

tags:
  - name: Accounts
    description: Operations related to bank accounts.

security:
  - bearerAuth: []

paths:
  /channel/accounts:
    get:
      tags:
        - Accounts
      summary: List accounts
      operationId: listAccounts
      parameters:
        - $ref: '#/components/parameters/XDeviceIpHeader'
        - $ref: '#/components/parameters/XSessionHeader'
        - $ref: '#/components/parameters/IdUserQuery'
        - $ref: '#/components/parameters/IdAccountTypeQuery'
        - $ref: '#/components/parameters/StatusQuery'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Accounts retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Accounts
      summary: Create account
      operationId: createAccount
      parameters:
        - $ref: '#/components/parameters/XDeviceIpHeader'
        - $ref: '#/components/parameters/XSessionHeader'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /channel/accounts/{id}:
    get:
      tags:
        - Accounts
      summary: Get account by id
      operationId: getAccountById
      parameters:
        - $ref: '#/components/parameters/XDeviceIpHeader'
        - $ref: '#/components/parameters/XSessionHeader'
        - $ref: '#/components/parameters/AccountId'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Accounts
      summary: Update account status
      description: Updates the account status. Use INACTIVE to deactivate an account.
      operationId: updateAccountStatus
      parameters:
        - $ref: '#/components/parameters/XDeviceIpHeader'
        - $ref: '#/components/parameters/XSessionHeader'
        - $ref: '#/components/parameters/AccountId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountStatusUpdateRequest'
      responses:
        '200':
          description: Account status updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /channel/accounts/number/{accountNumber}:
    get:
      tags:
        - Accounts
      summary: Get account by account number
      operationId: getAccountByNumber
      parameters:
        - $ref: '#/components/parameters/XDeviceIpHeader'
        - $ref: '#/components/parameters/XSessionHeader'
        - $ref: '#/components/parameters/AccountNumber'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token sent in the Authorization header using the Bearer scheme.

  parameters:
    XDeviceIpHeader:
      name: x-device-ip
      in: header
      required: true
      description: Client device IP address.
      schema:
        type: string
        minLength: 7
        maxLength: 45
        pattern: '^(((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})|([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4})$'
        example: "192.168.1.10"
    XSessionHeader:
      name: x-session
      in: header
      required: true
      description: Client session identifier.
      schema:
        type: string
        minLength: 36
        maxLength: 36
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
        example: "7f2c1a54-4cf0-4d8c-9b18-2a6a57e7f7f3"
    AccountId:
      name: id
      in: path
      required: true
      description: Unique account identifier.
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 1
    AccountNumber:
      name: accountNumber
      in: path
      required: true
      description: Unique account number.
      schema:
        type: string
        minLength: 1
        maxLength: 32
        pattern: '^[0-9]{1,32}$'
        example: "0010001234567890"
    IdUserQuery:
      name: idUser
      in: query
      required: false
      description: Filters accounts by user.
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 10
    IdAccountTypeQuery:
      name: idAccountType
      in: query
      required: false
      description: Filters accounts by account type.
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 2
    StatusQuery:
      name: status
      in: query
      required: false
      description: Filters accounts by status.
      schema:
        $ref: '#/components/schemas/Status'

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: Method not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Status:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
      minLength: 6
      maxLength: 8
      example: ACTIVE

    AccountCreateRequest:
      type: object
      additionalProperties: false
      properties:
        idAccountType:
          type: integer
          format: int32
          minimum: 1
          nullable: true
          example: 2
        idUser:
          type: integer
          format: int32
          minimum: 1
          nullable: true
          example: 10
        accountNumber:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[0-9]{1,32}$'
          example: "0010001234567890"
        balance:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 99999999999999999.99
          example: 1500.75
        status:
          $ref: '#/components/schemas/Status'
      required:
        - accountNumber
        - balance

    AccountStatusUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/Status'
      required:
        - status

    AccountResponse:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int32
          minimum: 1
          readOnly: true
          example: 1
        idAccountType:
          type: integer
          format: int32
          minimum: 1
          nullable: true
          example: 2
        idUser:
          type: integer
          format: int32
          minimum: 1
          nullable: true
          example: 10
        accountNumber:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[0-9]{1,32}$'
          example: "0010001234567890"
        balance:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 99999999999999999.99
          example: 1500.75
        status:
          $ref: '#/components/schemas/Status'
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: "2026-05-01T16:35:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          example: "2026-05-01T16:40:00Z"
      required:
        - id
        - accountNumber
        - balance
        - status

    Error:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[0-9]{3}$'
          example: "404"
        message:
          type: string
          minLength: 1
          maxLength: 255
          example: Resource not found.
        detail:
          type: string
          maxLength: 500
          example: No information was found for the submitted request.
      required:
        - code
        - message
